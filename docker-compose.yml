services:

  mysql:
    image: mysql:8
    container_name: manga-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: manga_db
      MYSQL_USER: manga_user
      MYSQL_PASSWORD: manga_pass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: manga-api
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"